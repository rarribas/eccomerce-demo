<app-list-header>
  <app-search-input (search)="onSearch($event)" placeholder="Search for products ..."/>
  <app-select [options]="categories" [optionType]="'category'" (optionSelected)="onCategorySelected($event)"/>
</app-list-header>

@if(products.length > 0){
  <app-list id="products">
    @for (product of products; track product.id) {
      <li><app-card [id]="product.id" [title]="product.title" [miniDescription]="product.miniDescription" [price]="product.price" [imageUrl]="product.imageUrl"></app-card></li>
    }
  </app-list>
} @else {
  <app-list-empty/>
}
