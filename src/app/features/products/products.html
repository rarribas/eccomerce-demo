@if(isLoading()){
  <app-loading/>
} @else {
  <app-list-header>
    @if(searchTerm() || selectedCategoryId()){
      <app-button (click)="clearFilters()">Clear Filters</app-button>
    }
    <app-search-input [initialSearchValue]="searchTerm()" (search)="onSearch($event)" placeholder="Search for products ..."/>
    <app-select [initialSelectedOptionId]="selectedCategoryId()" [options]="categories" [optionType]="'category'" (optionSelected)="onCategorySelected($event)"/>
  </app-list-header>

  @if(filteredProducts().length > 0){
    <app-list id="products">
      @for (product of filteredProducts(); track product.id) {
        <li><app-card [id]="product.id" [title]="product.title" [miniDescription]="product.miniDescription" [price]="product.price" [imageUrl]="product.imageUrl"></app-card></li>
      }
    </app-list>
  } @else {
    <app-list-empty/>
  }
}
